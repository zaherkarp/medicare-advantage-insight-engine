name: Scheduled Monitor Run

on:
  push:
    branches: [main]
  schedule:
    # Run every 6 hours at minutes 15
    - cron: "15 */6 * * *"
  workflow_dispatch:
    inputs:
      log_level:
        description: "Log level"
        required: false
        default: "INFO"
        type: choice
        options:
          - DEBUG
          - INFO
          - WARNING

permissions:
  contents: read

env:
  WEBHOOK_MODE: ${{ vars.WEBHOOK_MODE || 'ntfy' }}
  WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
  MIN_RELEVANCE_SCORE: ${{ vars.MIN_RELEVANCE_SCORE || '0.3' }}
  LOG_LEVEL: ${{ inputs.log_level || 'INFO' }}

jobs:
  monitor:
    name: Run Signal Monitor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.11-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.11-

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          # sgmllib3k fails to build a wheel with modern setuptools/pip, so
          # download the source tarball and copy the single-file module directly.
          pip download sgmllib3k --no-binary :all: -d /tmp/sgml
          tar xzf /tmp/sgml/sgmllib3k-*.tar.gz -C /tmp/sgml
          cp /tmp/sgml/sgmllib3k-*/sgmllib.py "$(python -c 'import sysconfig; print(sysconfig.get_path("purelib"))')"
          pip install feedparser --no-deps
          pip install requests python-dotenv pyyaml
          pip install . --no-deps

      - name: Run monitor pipeline
        run: ma-signal-monitor

      - name: Upload run database
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: monitor-state-${{ github.run_id }}
          path: data/state.db
          retention-days: 7
          if-no-files-found: ignore
